                  <div className="invitation-text px-4">
                    <h2 className="font-script text-3xl md:text-5xl opacity-80 leading-relaxed italic text-[#6d5a4d]">
                      {t.envelopeText}
                    </h2>
                  </div>
                  <div className="flap-top shadow-md"></div>
                  <button onClick={handleOpen} className="realistic-seal" aria-label="Open">
                    <div className="seal-inner">
                      <span className="font-script text-3xl text-[#a89f91] opacity-80" style={{ textShadow: '1px 1px 0px rgba(255,255,255,0.7)' }}>ME</span>
                    </div>
                  </button>
                </div>
              )}

              {/* --- SITO --- */}
              {isOpen && (
                <div className="animate-fade-in bg-[#fdfbf8] min-h-screen pb-20 font-normal">
                  {/* Hero Section */}
                  <section className="relative min-h-screen flex flex-col items-center justify-center text-center px-6 pt-10">
                    <div className="z-10 w-full max-w-4xl">
                      <h1 className="font-script text-8xl md:text-9xl mb-4 text-[#6d5a4d]">Michele <span className="text-4xl opacity-50">&</span> Ester</h1>
                      <p className="font-sans text-xs md:text-sm tracking-[0.8em] uppercase mb-12 opacity-80 font-bold">{t.sposi}</p>
                      <div className="space-y-3 mb-12">
                        <p className="font-body text-2xl md:text-3xl font-bold text-[#e0a699]">28 / 08 / 2026</p>
                        <p className="font-sans text-[11px] uppercase tracking-[0.4em] opacity-40">{t.location}</p>
                      </div>
                      <div className="w-full max-w-2xl aspect-[4/5] md:aspect-[3/2] bg-white shadow-2xl rounded-sm overflow-hidden border-[12px] border-white relative mx-auto group">
                        <div className="absolute inset-0 flex items-center justify-center opacity-10">
                          <Icon name="camera" size={48} />
                        </div>
                        <img 
                            src="public/IMG_8503.jpeg"
                            alt="Michele & Ester" 
                            className="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-105" 
                            onError={(e) => { e.target.src="https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&q=80&w=1200"; }} 
                        />
                        <div className="absolute inset-0 hero-gradient"></div>
                      </div>
                    </div>
                    <div className="mt-12 animate-bounce opacity-20"><Icon name="chevron-down" size={24} /></div>
                  </section>

                  {/* Dettagli */}
                  <section className="py-20 px-6 max-w-5xl mx-auto">
                    <SectionTitle>{t.details}</SectionTitle>
                    <div className="grid md:grid-cols-2 gap-12 text-center text-[#6d5a4d]">
                      <div className="bg-white rounded-[24px] p-6 shadow-sm border border-[#f2e6de] transition-transform hover:-translate-y-1">
                        <img src="https://www.theworldofsicily.com/wp-content/uploads/2018/06/Torre-Ligny_Trapani.jpg" className="w-full h-64 object-cover rounded-xl mb-6 shadow-md" alt="Cerimonia" />
                        <div className="font-body font-bold text-[#e0a699] text-xl mb-1 italic font-normal">17:00</div>
                        <h4 className="font-script text-4xl mb-4">{t.lignyTitle}</h4>
                        <p className="text-sm opacity-60 mb-8 italic">{t.lignyDesc}</p>
                        <a href="https://www.google.com/maps/place/Museo+Civico+Torre+di+Ligny/@38.0196485,12.4943363,17z/data=!3m2!4b1!5s0x131961a5be6521bd:0x5dee72825fc4ebfb!4m6!3m5!1s0x131961a4ffeb240f:0x1a88fec85d3a4a42!8m2!3d38.0196443!4d12.4969112!16s%2Fg%2F1212gswg?entry=ttu&g_ep=EgoyMDI2MDIyNS4wIKXMDSoASAFQAw%3D%3D" target="_blank" className="inline-flex items-center gap-2 px-8 py-3 border border-[#e0a699] text-[#e0a699] rounded-full text-[10px] uppercase tracking-widest font-bold hover:bg-[#e0a699] hover:text-white transition-all">{t.map} <Icon name="map-pin" size={12} /></a>
                      </div>
                      <div className="bg-white rounded-[24px] p-6 shadow-sm border border-[#f2e6de] transition-transform hover:-translate-y-1">
                        <img src="https://lh3.googleusercontent.com/p/AF1QipN_wOV9XrJW5WeddlnZQtUcLt35qwqC2vnb6Z6p=s1360-w1360-h1020-rw" className="w-full h-64 object-cover rounded-xl mb-6 shadow-md" alt="Ricevimento" />
                        <div className="font-body font-bold text-[#e0a699] text-xl mb-1 italic font-normal">19:30</div>
                        <h4 className="font-script text-4xl mb-4">{t.strafalcelloTitle}</h4>
                        <p className="text-sm opacity-60 mb-8 italic">{t.strafalcelloDesc}</p>
                        <a href="https://www.google.com/maps/place/Baglio+Strafalcello/@38.009686,12.7634552,17z/data=!3m1!4b1!4m6!3m5!1s0x13197f1b7b6d34d7:0x44496a435207ef3e!8m2!3d38.0096818!4d12.7660301!16s%2Fg%2F11bvt1j6vf?entry=ttu&g_ep=EgoyMDI2MDIyNS4wIKXMDSoASAFQAw%3D%3D" target="_blank" className="inline-flex items-center gap-2 px-8 py-3 border border-[#e0a699] text-[#e0a699] rounded-full text-[10px] uppercase tracking-widest font-bold hover:bg-[#e0a699] hover:text-white transition-all">{t.map} <Icon name="map-pin" size={12} /></a>
                      </div>
                    </div>
                  </section>

                  {/* Programma */}
                  <section className="py-24 px-6 bg-[#f7f3ef] border-y border-[#f2e6de]">
                    <SectionTitle>{t.programTitle}</SectionTitle>
                    <div className="max-w-xl mx-auto space-y-10">
                      {t.program.map((item, index) => (
                        <div key={index} className="flex gap-8 group">
                          <div className="text-right min-w-[70px] pt-1">
                            <span className="font-sans font-semibold text-xs text-[#e0a699] tracking-wider font-normal">{item.time}</span>
                          </div>
                          <div className="relative">
                            <div className="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-[#e0a699] z-10 relative border border-[#f2e6de]">
                               <Icon name={item.icon} size={16} />
                            </div>
                            {index !== 7 && <div className="absolute top-10 left-[19.5px] w-[1px] h-full bg-[#d4ccc4] opacity-50"></div>}
                          </div>
                          <div className="pb-4">
                            <h4 className="font-body font-bold text-xl leading-none mb-3 font-normal">{item.title}</h4>
                            <p className={`font-body opacity-70 leading-relaxed font-normal ${item.small ? 'text-xs italic' : 'text-sm'}`}>{item.desc}</p>
                          </div>
                        </div>
                      ))}
                    </div>
                  </section>

                  {/* Your Trip Guide */}
                  <section className="py-24 px-6 max-w-6xl mx-auto text-[#6d5a4d]">
                    <SectionTitle>{t.tripGuide}</SectionTitle>
                    <div className="grid md:grid-cols-3 gap-12 font-normal">
                      
                      {/* Arrivare */}
                      <div className="bg-white p-10 rounded-[30px] shadow-sm border border-gray-100 flex flex-col">
                        <div className="flex items-center gap-3 mb-6 text-[#e0a699] font-normal">
                          <Icon name="plane" /> <h4 className="font-sans font-bold uppercase tracking-widest text-xs font-bold">{t.arrive}</h4>
                        </div>
                        <p className="opacity-80 font-body text-[14px] leading-relaxed font-normal">{t.arriveText}</p>
                      </div>
                      
                      {/* Dove Soggiornare */}
                      <div className="bg-white p-10 rounded-[30px] shadow-sm border border-gray-100 flex flex-col">
                        <div className="flex items-center gap-3 mb-6 text-[#e0a699] font-normal">
                          <Icon name="bed" /> <h4 className="font-sans font-bold uppercase tracking-widest text-xs font-bold">{t.stayTitle}</h4>
                        </div>
                        <div className="opacity-80 font-body text-[14px] leading-relaxed space-y-4 font-normal text-[#6d5a4d]">
                            <p>{t.stayIntro}</p>
                            <p><strong>{lang === 'it' ? "Per chi non ha l'auto:" : lang === 'ca' ? "Per a qui no tingui cotxe:" : "For those without a car:"}</strong> {t.stayP1}</p>
                            <p><strong>{lang === 'it' ? "Per il relax:" : lang === 'ca' ? "Per relaxar-se:" : "For relaxation:"}</strong> {t.stayP2}</p>
                        </div>
                      </div>

                      {/* Vacanze Siciliane */}
                      <div className="bg-white p-10 rounded-[30px] shadow-sm border border-gray-100 flex flex-col font-normal text-[#6d5a4d]">
                        <div className="flex items-center gap-3 mb-6 text-[#e0a699]">
                          <Icon name="navigation" /> <h4 className="font-sans font-bold uppercase tracking-widest text-xs font-bold">{t.vacationTitle}</h4>
                        </div>
                        <div className="opacity-80 font-body text-[14px] leading-relaxed space-y-4 font-normal">
                            <p><strong>{t.vacP1Title}</strong> {t.vacP1}</p>
                            <p><strong>{t.vacP2Title}</strong> {t.vacP2}</p>
                            <p><strong>{t.vacP3Title}</strong> {t.vacP3}</p>
                        </div>
                      </div>
                    </div>
                  </section>

                  {/* FAQ */}
                  <section className="py-24 px-6 bg-white border-t border-[#f2e6de] text-[#6d5a4d]">
                    <div className="max-w-4xl mx-auto px-4">
                      <SectionTitle>{t.faqTitle}</SectionTitle>
                      <div className="grid md:grid-cols-2 gap-16 font-body font-normal">
                        <div className="space-y-12">
                          <div className="flex gap-5">
                            <div className="w-12 h-12 bg-[#fdfbf8] rounded-full flex items-center justify-center shrink-0 text-[#e0a699] shadow-sm"><Icon name="sun" size={22} /></div>
                            <div><h5 className="font-bold text-base mb-3 font-normal">{t.meteoQ}</h5><p className="opacity-80 text-[14px] font-normal">{t.meteoA}</p></div>
                          </div>
                          <div className="flex gap-5">
                            <div className="w-12 h-12 bg-[#fdfbf8] rounded-full flex items-center justify-center shrink-0 text-[#e0a699] shadow-sm"><Icon name="bus" size={22} /></div>
                            <div><h5 className="font-bold text-base mb-3 font-normal">{t.shuttleQ}</h5><p className="opacity-80 text-[14px] font-normal">{t.shuttleA}</p></div>
                          </div>
                        </div>
                        <div className="space-y-12">
                          <div className="flex gap-5">
                            <div className="w-12 h-12 bg-[#fdfbf8] rounded-full flex items-center justify-center shrink-0 text-[#e0a699] shadow-sm"><Icon name="shirt" size={22} /></div>
                            <div><h5 className="font-bold text-base mb-3 font-normal">{t.dressQ}</h5><p className="opacity-80 text-[14px] font-normal">{t.dressA}</p></div>
                          </div>
                          <div className="flex gap-5">
                            <div className="w-12 h-12 bg-[#fdfbf8] rounded-full flex items-center justify-center shrink-0 text-[#e0a699] shadow-sm"><Icon name="phone" size={22} /></div>
                            <div><h5 className="font-bold text-base mb-3 font-normal font-normal">{t.contactQ}</h5><p className="opacity-80 text-[14px] leading-relaxed font-normal">{t.contactA}<br/><strong>Michele: +39 328 8641635, Ester: +49 172 1767082</strong></p></div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </section>

                  {/* Gift */}
                  <section className="py-24 px-6 bg-[#fdfbf8] text-center border-t border-[#f2e6de] text-[#6d5a4d]">
                    <div className="max-w-2xl mx-auto px-4 font-normal text-[#6d5a4d]">
                      <SectionTitle>{t.giftTitle}</SectionTitle>
                      <p className="font-body italic opacity-80 mb-12 text-[15px] font-normal">{t.giftText}</p>
                      <div className="bg-white p-12 rounded-[40px] shadow-sm border border-[#f2e6de] inline-block transition-transform hover:scale-[1.01]">
                        <Icon name="credit-card" size={40} className="mx-auto mb-5 opacity-10" />
                        <p className="font-sans font-bold tracking-[0.2em] text-[10px] mb-3 uppercase opacity-50 font-bold">Coordinate Bancarie / IBAN</p>
                        <p className="font-sans text-sm md:text-xl select-all font-semibold tracking-wider font-bold text-[#6d5a4d]">IT 00 X 00000 00000 000000000000</p>
                        <p className="text-[10px] mt-4 opacity-40 uppercase tracking-[0.2em] font-sans font-normal">{t.giftOwner}</p>
                      </div>
                    </div>
                  </section>

                  {/* RSVP */}
                  <section className="py-24 px-6 bg-white mb-10 border-t border-[#f2e6de] text-[#6d5a4d]">
                    <div className="max-w-xl mx-auto px-4 font-normal text-[#6d5a4d]">
                      <SectionTitle>{t.rsvpTitle}</SectionTitle>
                      {rsvpSent ? (
                        <div className="text-center p-16 bg-[#fdfbf8] rounded-[48px] border border-[#e0a699] animate-fade-in shadow-inner">
                          <Icon name="check-circle-2" size={60} className="mx-auto text-[#e0a699] mb-6" />
                          <h3 className="font-script text-5xl mb-3 text-[#6d5a4d]">{t.rsvpThanks}</h3>
                          <p className="font-body opacity-80 italic text-[15px] font-normal">{t.rsvpConfirm || t.rsvpSuccess}</p>
                        </div>
                      ) : (
                        <form className="space-y-8" onSubmit={submitRSVP}>
                          <div className="space-y-6 text-[#6d5a4d]">
                            <div>
                              <label className="text-[11px] uppercase tracking-widest opacity-60 mb-2 font-bold font-sans block">{t.rsvpName}</label>
                              <input required name="nome" type="text" className="w-full p-5 bg-[#fdfbf8] border border-[#f2e6de] rounded-2xl outline-none focus:border-[#e0a699] font-sans text-sm shadow-sm font-normal" />
                            </div>
                            <div className="pt-2">
                              <p className="text-[11px] uppercase tracking-widest opacity-60 mb-4 font-bold font-sans">{t.rsvpAttend}</p>
                              <div className="flex gap-4">
                                {[{k: 'yes', v: t.rsvpYes}, {k: 'no', v: t.rsvpNo}].map(opt => (
                                  <label key={opt.k} className="flex-1 flex items-center justify-center p-5 bg-[#fdfbf8] border border-[#f2e6de] rounded-2xl cursor-pointer hover:border-[#e0a699] transition-all has-[:checked]:bg-[#fefaf9] has-[:checked]:border-[#e0a699] shadow-sm">
                                    <input required type="radio" name="attending" className="mr-2 accent-[#e0a699]" value={opt.k} onChange={(e) => setAttending(e.target.value)} />
                                    <span className="text-xs font-medium font-body font-normal">{opt.v}</span>
                                  </label>
                                ))}
                              </div>
                            </div>
                          </div>
                          {attending === 'yes' && (
                            <div className="space-y-8 animate-fade-in text-[#6d5a4d]">
                              <div>
                                <label className="text-[11px] uppercase tracking-widest opacity-60 mb-2 font-bold font-sans block">{t.rsvpGuests}</label>
                                <input required name="ospiti" type="text" className="w-full p-5 bg-[#fdfbf8] border border-[#f2e6de] rounded-2xl outline-none shadow-sm font-sans font-normal" placeholder="Es: 2 (Marco e Sofia)" />
                              </div>
                              <div className="space-y-4">
                                <p className="text-[11px] uppercase tracking-widest opacity-60 font-bold font-sans text-center">{t.rsvpShuttle}</p>
                                <div className="flex flex-col gap-3">
                                  {[{k: 'yes', v: t.rsvpShuttleYes}, {k: 'no', v: t.rsvpShuttleNo}, {k: 'maybe', v: t.rsvpMaybe}].map(opt => (
                                    <label key={opt.k} className="flex items-center gap-4 p-5 bg-[#fdfbf8] border border-[#f2e6de] rounded-2xl cursor-pointer hover:border-[#e0a699] shadow-sm transition-all text-sm font-body font-normal">
                                      <input required type="radio" name="shuttle" value={opt.k} onChange={(e) => setNeedsShuttle(e.target.value)} className="accent-[#e0a699] w-4 h-4 mr-2" />
                                      {opt.v}
                                    </label>
                                  ))}
                                </div>
                              </div>
                              {needsShuttle === 'yes' && (
                                <div className="space-y-4 p-6 bg-[#fefaf9] rounded-[24px] border border-[#f2e6de] shadow-inner font-normal">
                                  <p className="text-[11px] uppercase opacity-70 mb-2 font-bold font-sans">{t.rsvpShuttleTime}</p>
                                  <select name="ritorno" className="w-full p-5 bg-white border border-[#f2e6de] rounded-xl outline-none shadow-sm text-sm font-sans font-bold">
                                    <option value="gruppo1">01:30</option>
                                    <option value="gruppo2">04:00</option>
                                  </select>
                                </div>
                              )}
                              <div>
                                <label className="text-[11px] uppercase tracking-widest opacity-60 mb-2 font-bold font-sans block">{t.rsvpAllergies}</label>
                                <textarea name="allergie" className="w-full p-5 bg-[#fdfbf8] border border-[#f2e6de] rounded-2xl h-28 outline-none focus:border-[#e0a699] shadow-sm text-sm font-body font-normal"></textarea>
                              </div>
                            </div>
                          )}
                          <button type="submit" disabled={loading} className="w-full py-6 bg-[#e0a699] text-white rounded-full font-sans text-[11px] uppercase tracking-[0.4em] shadow-xl hover:brightness-105 active:scale-95 transition-all mt-10 font-bold disabled:opacity-50">
                            {loading ? t.loading : t.rsvpSubmit}
                          </button>
                        </form>
                      )}
                    </div>
                  </section>

                  <footer className="py-24 text-center opacity-40 border-t border-[#f2e6de] font-sans text-[11px] uppercase tracking-[0.6em] text-[#6d5a4d]">
                    <Icon name="heart" className="mx-auto mb-6 text-[#e0a699]" />
                    <p className="font-normal font-bold">Michele & Ester • 28.08.2026</p>
                  </footer>
                </div>
              )}
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
